[pytest]
# ============================================================================
# Pytest Configuration for DevPyLib
#
# This configuration supports running tests with:
# 1. mayapy (Maya's Python interpreter)
# 2. Standard Python (for non-Maya tests)
#
# Usage:
#   mayapy -m pytest                    # Run all tests with Maya
#   mayapy -m pytest -m unit            # Run only unit tests
#   mayapy -m pytest -m integration     # Run only integration tests
# ============================================================================

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths = mayaLib/test tests

# Command line options (applied by default)
addopts =
    # Output format
    -v                          # Verbose output
    --tb=short                  # Short traceback format
    --color=yes                 # Colored output

    # Test execution
    --strict-markers            # Error on undefined markers
    --strict-config             # Error on unknown config keys

    # Warnings
    -W ignore::DeprecationWarning        # Ignore Maya deprecation warnings
    -W ignore::PendingDeprecationWarning

    # Performance
    --maxfail=5                 # Stop after 5 failures

    # Coverage (uncomment to enable)
    # --cov=mayaLib
    # --cov-report=html
    # --cov-report=term-missing

# Test markers for organization
markers =
    unit: Unit tests - no Maya scene required, fast (<100ms)
    integration: Integration tests - requires Maya scene, medium speed (100ms-1s)
    gui: GUI tests - requires interactive Maya session, slow (>1s)
    slow: Slow tests - expected to take >1 second

    # DCC-specific markers
    maya: Requires Maya environment (mayapy)
    maya2024: Requires Maya 2024 specifically
    maya2023: Requires Maya 2023 specifically
    houdini: Requires Houdini environment
    blender: Requires Blender environment

    # Component markers
    rig: Rigging system tests
    anim: Animation system tests
    model: Modeling tools tests
    shader: Shader/material tests
    fluid: Fluid simulation tests
    bifrost: Bifrost integration tests
    gui_component: GUI component tests
    pipeline: Pipeline utility tests

    # Test quality markers
    wip: Work in progress - may fail
    skip: Skip this test
    xfail: Expected to fail

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout (requires pytest-timeout)
# timeout = 300  # 5 minutes per test

# Test order (requires pytest-randomly)
# randomly-seed = 12345

# Parallel execution (requires pytest-xdist)
# -n auto  # Use all CPU cores

# Maya-specific configuration
# These are custom options - implementation required in conftest.py
maya_python = /usr/autodesk/maya2024/bin/mayapy
maya_batch = /usr/autodesk/maya2024/bin/maya -batch -command
maya_version = 2024

# Minimum versions
minversion = 7.0

# Ignore paths
norecursedirs =
    .git
    .tox
    .eggs
    __pycache__
    .venv
    venv
    build
    dist
    *.egg
    docs
    .cache

# Doctest configuration (if using doctest)
doctest_optionflags =
    NORMALIZE_WHITESPACE
    ELLIPSIS
    IGNORE_EXCEPTION_DETAIL

# ============================================================================
# Coverage Configuration (if pytest-cov is installed)
# ============================================================================
[coverage:run]
source = mayaLib, houdiniLib, blenderLib
omit =
    */test/*
    */tests/*
    */__pycache__/*
    */.*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
