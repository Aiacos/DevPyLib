# GitHub Actions CI Workflow for DevPyLib
# Runs linting and formatting checks on push/PR
# On autoclaude branch: auto-fixes and commits ruff violations

name: CI

on:
  push:
    branches: [main, master, develop, autoclaude]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff>=0.1.0

      - name: Run Ruff auto-fix (autoclaude/develop branches)
        if: github.ref == 'refs/heads/autoclaude' || github.ref == 'refs/heads/develop'
        run: |
          ruff check . --fix --unsafe-fixes
          ruff format .

      - name: Commit auto-fixes (autoclaude/develop branches)
        if: github.ref == 'refs/heads/autoclaude' || github.ref == 'refs/heads/develop'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: auto-fix ruff lint and format violations"
          git push

      - name: Run Ruff check (linting)
        run: ruff check . --output-format=github

      - name: Run Ruff format check
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest>=7.0.0 pytest-cov>=4.0.0
          pip install numpy GitPython

      - name: Run tests with coverage
        run: |
          pytest -m "unit or not maya" -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing || echo "No tests found or tests skipped"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
